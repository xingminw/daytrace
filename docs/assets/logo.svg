<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="DayTrace">
  <title>DayTrace</title>
  <!-- Pixel sparkline: 7 bars, a week traced. Terminal-blue fill (#7aa2f7)
       reads on both light and dark backgrounds. Use logo-mono.svg with
       inline SVG + currentColor if you want CSS-driven theming. -->
  <g fill="#7aa2f7">
    <rect x="3"  y="20" width="3" height="9"/>
    <rect x="7"  y="11" width="3" height="18"/>
    <rect x="11" y="16" width="3" height="13"/>
    <rect x="15" y="6"  width="3" height="23"/>
    <rect x="19" y="13" width="3" height="16"/>
    <rect x="23" y="22" width="3" height="7"/>
    <rect x="27" y="17" width="3" height="12"/>
  </g>
</svg>
