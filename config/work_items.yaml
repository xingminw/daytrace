# config/work_items.yaml — Feishu Bitables to mirror locally.
#
# Boundary contract — three column tiers:
#
#   ┌─ Tier 1: DayTrace READS for display ──────────────────────────────┐
#   │ title / status / priority / tags / subtitle / due / external_links │
#   │ These appear in the Tasks panel + drive the 任务 dim aggregation.  │
#   │ Add them to `field_map` below.                                     │
#   └────────────────────────────────────────────────────────────────────┘
#   ┌─ Tier 2: DayTrace WRITES (future, Phase 5) ───────────────────────┐
#   │ e.g. "记录" (DayTrace activity log) / "时长" (computed hours)     │
#   │ Add them to `write_fields` below when ready. Phase 5 will         │
#   │ ONLY touch these columns — never tier-1 read columns.             │
#   └────────────────────────────────────────────────────────────────────┘
#   ┌─ Tier 3: Other agents OWN — DayTrace IGNORES ─────────────────────┐
#   │ Agent 工作区 / 备注 / 用户原话 / 飞书链接 / 原始附件                │
#   │ Don't list them anywhere; they stay untouched on Feishu and       │
#   │ aren't even copied locally.                                       │
#   └────────────────────────────────────────────────────────────────────┘
#
# Disabling enabled=false hides the Tasks panel + 任务 dim option;
# nothing else breaks.

enabled: true

# 1..N tables. Each table gets a `key` (local id used as table_key in
# SQLite + as a chip label) and a `field_map` mapping logical names →
# actual Feishu column names. Tables can have different column schemas;
# missing keys in field_map are simply not stored.
tables:

  - key: tasks
    name: 任务
    app_token: F9p4bjm24axBY8sd8macJIySnYe
    table_id:  tbldFwiuV4K0l2Lp
    as: user
    # Tier-1 reads: only what the Tasks panel + 任务 dim actually use.
    # Dropped sync of Agent 工作区, 用户原话, 备注, 下一步时间, 下一步动作,
    # 每周预计投入, 飞书链接, 原始附件 — those are tier-3 (other-agent-owned)
    # or unused fields. They stay live on Feishu, just not mirrored here.
    field_map:
      title:          任务
      subtitle:       项目来源
      status:         状态
      priority:       重要程度
      tags:           标签
      due_date:       截止时间
      external_links: [外部链接 1, 外部链接 2, 外部链接 3]
    # write_fields: []  # Phase 5: DayTrace-owned columns we'd write back

  - key: reviews
    name: 审稿
    app_token: FJTLbsd6RaP1omsbvYDcuN5ZnTe
    table_id:  tblQW1NW564DUa1D
    as: user
    # When true, every event linked to ANY record in this table is bucketed
    # under one shared dim value (`collapsed_label`) in the 任务 dim.
    # This keeps the Chart panel's distribution clean — 33 individual paper
    # reviews would otherwise drown out the real "tasks" view. The Tasks
    # panel still lists each review row individually.
    collapse_in_dim: true
    collapsed_label: 审稿
    # Tier-1 reads only. 备注 is included in external_links because the
    # GitHub issue URL lives inside it as plain text; we extract the URL
    # but never write the column back.
    field_map:
      title:          题目
      subtitle:       稿件编号
      status:         状态
      tags:           期刊        # 期刊 plays the "tags" role here
      due_date:       截止日期
      external_links: [工作区链接, 备注]
    # write_fields: []  # Phase 5
