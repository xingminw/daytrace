# config/work_items.yaml — Feishu Bitables to mirror locally.
# Read-only on the Feishu side. Disabling this just hides the Tasks panel
# + 任务 dim option; nothing else breaks.

enabled: true

# 1..N tables. Each table gets a `key` (local id used as table_key in
# SQLite + as a chip label) and a `field_map` mapping logical names →
# actual Feishu column names. Tables can have different column schemas;
# missing keys in field_map are simply not stored.
tables:

  - key: tasks
    name: 任务
    app_token: F9p4bjm24axBY8sd8macJIySnYe
    table_id:  tbldFwiuV4K0l2Lp
    as: user
    field_map:
      title:            任务
      status:           状态
      priority:         重要程度
      tags:             标签
      subtitle:         项目来源
      due_date:         截止时间
      next_action_date: 下一步时间
      weekly_hours:     每周预计投入
      next_action:      下一步动作
      agent_workspace:  Agent 工作区
      external_links:   [外部链接 1, 外部链接 2, 外部链接 3]

  - key: reviews
    name: 审稿
    app_token: FJTLbsd6RaP1omsbvYDcuN5ZnTe
    table_id:  tblQW1NW564DUa1D
    as: user
    # When true, every event linked to ANY record in this table is bucketed
    # under one shared dim value (`collapsed_label`) in the 任务 dim.
    # This keeps the Chart panel's distribution clean — 33 individual paper
    # reviews would otherwise drown out the real "tasks" view. The Tasks
    # panel still lists each review row individually.
    collapse_in_dim: true
    collapsed_label: 审稿
    field_map:
      title:    题目
      status:   状态
      tags:     期刊        # 期刊 (journal) plays the "tags" role here
      subtitle: 稿件编号
      due_date: 截止日期
      # 备注 contains GitHub issue URLs in plain text; we parse them out.
      external_links: [工作区链接, 备注]
