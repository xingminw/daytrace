# config/work_item_aliases.yaml — manual project_guess → Feishu record_id map.
# Used by daytrace.work_items.rebuild_links() as a deterministic override
# for cases where URL matching doesn't find a link (e.g. chat-only projects).
#
# Find a record_id with:
#   lark-cli base +record-list --as user \
#     --base-token <app_token> --table-id <table_id> --limit 50
# (first column of the markdown table.)

aliases:
  # Resolves event.project_guess differences in casing / wording that
  # the URL-based matcher can't bridge.
  "DayTrace Joint": recvjKgrBShiWP   # → DayTrace 应用开发
  "Daily Briefing": recvjP3BNUM48e   # → Daily briefing 开发项目
