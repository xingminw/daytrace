# Copy to config/remotes.yaml and fill in your own remotes.
# The real config/remotes.yaml is gitignored.
#
# config/remotes.yaml — single source of truth for "what other machines does
# this hub pull from?".
#
# Used by:
#   - `run_daily.py deploy`  — rsync local code (scripts/, daytrace/, config/)
#                              to every remote's repo_path
#   - `run_daily.py catchup` — for each remote, ssh in to run collect_from_config
#                              and rsync data/inbox/<device>/<date>/ back
#
# Adding a new remote: append a block here, then re-run `deploy` once. catchup
# will start including it on the next nightly run.

remotes: []
# Example:
#   - device_id: my-remote
#     ssh: my-ssh-alias
#     repo_path: /path/to/daytrace/clone
#     config: config/devices/my-remote.yaml
